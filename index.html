<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Line Splitter v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Comfortaa', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 40px 24px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  header { margin-bottom: 8px; }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #777; }

  .card {
    background: #fff;
    border: 1px solid #e4e2dc;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #888;
    display: block;
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    height: 220px;
    padding: 12px 14px;
    font-family: 'Comfortaa', sans-serif;
    font-size: 12px;
    line-height: 1.75;
    background: #fafaf8;
    border: 1px solid #e4e2dc;
    border-radius: 8px;
    color: #1a1a1a;
    resize: vertical;
    outline: none;
    transition: border-color .15s;
  }
  textarea:focus { border-color: #aaa; }
  textarea::placeholder { color: #bbb; }

  .controls { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; }

  input[type=number] {
    width: 90px;
    padding: 9px 12px;
    font-family: 'Comfortaa', sans-serif;
    font-size: 13px;
    background: #fafaf8;
    border: 1px solid #e4e2dc;
    border-radius: 8px;
    color: #1a1a1a;
    outline: none;
    transition: border-color .15s;
  }
  input[type=number]:focus { border-color: #aaa; }

  .options-row {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 10px 14px;
    background: #fafaf8;
    border: 1px solid #e4e2dc;
    border-radius: 8px;
  }

  .option-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: #888;
  }

  .toggle-btn {
    display: flex;
    border: 1px solid #e4e2dc;
    border-radius: 6px;
    overflow: hidden;
  }

  .toggle-btn button {
    padding: 5px 13px;
    font-family: 'Comfortaa', sans-serif;
    font-size: 12px;
    font-weight: 500;
    border: none;
    background: #fff;
    color: #888;
    cursor: pointer;
    transition: background .1s, color .1s;
  }

  .toggle-btn button.active { background: #1a1a1a; color: #fff; }
  .toggle-btn button + button { border-left: 1px solid #e4e2dc; }

  #customWords {
    flex: 1;
    padding: 5px 10px;
    font-family: 'Comfortaa', sans-serif;
    font-size: 12px;
    background: #fff;
    border: 1px solid #e4e2dc;
    border-radius: 6px;
    color: #1a1a1a;
    outline: none;
    transition: border-color .15s;
  }
  #customWords:focus { border-color: #aaa; }
  #customWords::placeholder { color: #bbb; }

  .hint { font-size: 11px; color: #aaa; white-space: nowrap; }

  .btn {
    padding: 9px 20px;
    font-family: 'Comfortaa', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: #1a1a1a; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #333; }
  .btn-primary:disabled { opacity: .35; cursor: default; }
  .btn-secondary { background: #f0efe9; border: 1px solid #e4e2dc; color: #1a1a1a; }
  .btn-secondary:hover:not(:disabled) { background: #e8e7e0; }
  .btn-secondary:disabled { opacity: .35; cursor: default; }

  .status { font-size: 12px; font-family: 'Comfortaa', sans-serif; color: #888; align-self: center; }
  .status.ok { color: #2d7a3a; }
  .status.err { color: #b53a2f; }

  .preview-wrap { border: 1px solid #e4e2dc; border-radius: 8px; overflow: hidden; }

  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    background: #fafaf8;
    border-bottom: 1px solid #e4e2dc;
    font-size: 11px;
    color: #888;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
  }

  .preview-table-wrap { overflow-x: auto; max-height: 400px; overflow-y: auto; }

  table { width: 100%; border-collapse: collapse; font-family: 'Comfortaa', sans-serif; font-size: 12px; }

  thead th {
    position: sticky;
    top: 0;
    padding: 7px 12px;
    background: #fafaf8;
    border-bottom: 1px solid #e4e2dc;
    color: #888;
    font-weight: 500;
    text-align: left;
    white-space: nowrap;
    z-index: 1;
  }
  thead th:first-child { width: 56px; text-align: center; }

  tbody tr:nth-child(even) td { background: #fafaf8; }

  tbody td {
    padding: 5px 12px;
    border-bottom: 1px solid #f0efe9;
    color: #1a1a1a;
    vertical-align: top;
    line-height: 1.6;
  }
  tbody td:first-child { text-align: center; color: #bbb; font-size: 11px; width: 56px; }
  tbody td[contenteditable] { outline: none; cursor: text; }
  tbody td[contenteditable]:focus {
    background: #fffef5 !important;
    box-shadow: inset 0 0 0 1px #d4c97a;
    border-radius: 2px;
  }
  tbody td[contenteditable]:hover:not(:focus) { background: #f5f4ee !important; }
  tbody tr:last-child td { border-bottom: none; }

  footer { text-align: center; font-size: 11px; color: #bbb; padding-top: 8px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Script Line Splitter <span style="font-size:13px;font-weight:400;color:#aaa;">v2.0</span></h1>
    <p class="subtitle">Paste a script, set your max line length, and download a numbered Excel file.</p>
  </header>

  <div class="card">
    <div>
      <label>Paste script text</label>
      <textarea id="input" placeholder="Paste your script here...&#10;&#10;Tip: Ctrl+Enter to process."></textarea>
    </div>

    <div class="options-row">
      <span class="option-label">Cleanup</span>
      <div class="toggle-btn">
        <button id="cleanup-off" class="active" onclick="setCleanup('off')">Off</button>
        <button id="cleanup-caps" onclick="setCleanup('caps')">Undo all-caps</button>
      </div>
    </div>

    <div class="options-row" id="customWordsRow" style="display:none">
      <span class="option-label">Keep capitalized</span>
      <input type="text" id="customWords" placeholder="e.g. NASA, Vikki, (Heather Speed) -- wrap in () for phrase-only">
      <span class="hint">Plain = match anywhere &nbsp;|&nbsp; (Phrase) = only as a complete phrase</span>
    </div>

    <div class="controls">
      <div class="field">
        <label>Max chars / line</label>
        <input type="number" id="maxLen" value="150" min="40" max="500">
      </div>
      <button class="btn btn-primary" id="processBtn" onclick="run()">Process script</button>
      <button class="btn btn-secondary" id="downloadBtn" onclick="downloadExcel()" disabled>Download .xlsx</button>
      <span class="status" id="status"></span>
    </div>

    <div class="preview-wrap" id="previewWrap" style="display:none">
      <div class="preview-header">
        <span>Preview</span>
        <span id="rowCount"></span>
      </div>
      <div class="preview-table-wrap">
        <table>
          <thead><tr><th>#</th><th>Line</th></tr></thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <footer>Intellitext LLC</footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let processedRows = [];
let cleanupMode = 'off';

function setCleanup(mode) {
  cleanupMode = mode;
  ['off','caps'].forEach(m => {
    document.getElementById('cleanup-' + m).classList.toggle('active', m === mode);
  });
  document.getElementById('customWordsRow').style.display = mode === 'caps' ? '' : 'none';
}

// ── Cleanup ───────────────────────────────────────────────────────────────────

const PROTECTED = new Set([
  // Note: US, USA, and all two-letter state abbreviations are intentionally excluded.
  // They are indistinguishable from common lowercase words (us, me, in, or, ok, etc.)
  // after lowercasing. Add them via the "Keep capitalized" field if needed for a specific script.
  'UK','EU','UN','NATO','USSR','ROTC','POW','MIA',
  'FBI','CIA','NSA','DEA','ATF','IRS','TSA','DHS','DOD','DOJ','DOE',
  'EPA','FDA','FCC','FTC','SEC','FEMA','USMC','USAF','USN',
  'NASA','STEM','AI','DNA','RNA','GPS','USB','CPU','GPU','RAM',
  'HTML','CSS','API','URL','HTTP','HTTPS','PDF','SQL',
  'GPA','SAT','ACT','AP','IB','PhD','MBA','MD','JD','RN','BS','BA','MS','MA',
  'ACLU','NAACP','YMCA','YWCA','NFL','NBA','MLB','NHL','MLS','NCAA','IOC',
  'CDC','NIH','AMA','ABA','IEEE',
  'CEO','CFO','COO','CTO','VP','HR','PR','LLC','INC','LTD',
  'EST','PST','MST','CST','BC','AD',
  'UNR','UNLV','NSHE',
  'LDS','BC',
  'LGBTQ','HVAC','WiFi',
  'Dr','Mr','Mrs','Ms','Prof','Rev','Hon','Gov','Sen','Rep',
  'Gen','Col','Capt','Lt','Sgt','Cmdr','Adm','Pres',
  'Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday',
  'January','February','March','April','May','June','July',
  'August','September','October','November','December',
  'American','Americans','America','United','States','God','English','President','System',
  'Nevada','Reno','UNR','UNLV','University','Sandoval','Regent','Regents',
]);

// Parse the custom words field.
// Entries wrapped in parentheses e.g. (Heather Speed) are "phrase-only" --
// the entire phrase is matched as a unit, so "speed" alone is left untouched.
// Plain entries like Vikki are matched at any word boundary as before.
function getCustomWords() {
  const raw = document.getElementById('customWords').value;
  return raw.split(',').map(w => w.trim()).filter(Boolean).map(entry => {
    const phraseMatch = entry.match(/^\((.+)\)$/);
    if (phraseMatch) {
      return { text: phraseMatch[1].trim(), phraseOnly: true };
    }
    return { text: entry, phraseOnly: false };
  });
}

function capitalizeSentenceStarts(text) {
  text = text.replace(/^([a-z])/, c => c.toUpperCase());
  text = text.replace(/([.!?]['")\]]*)\s+([a-z])/g, (m, punct, letter) => punct + ' ' + letter.toUpperCase());
  return text;
}

function fixPronouns(text) {
  return text.replace(/(?<![a-zA-Z])i(?![a-zA-Z])/g, 'I');
}

// Multi-word phrases that should always be title-cased as a unit in undo-caps mode.
const PROTECTED_PHRASES = [
  'Nevada System of Higher Education',
  'President Sandoval',
];

function applyUndoCaps(text) {
  text = text.toLowerCase();
  text = capitalizeSentenceStarts(text);
  text = fixPronouns(text);
  PROTECTED.forEach(word => {
    const re = new RegExp(`\\b${word.toLowerCase()}\\b`, 'g');
    text = text.replace(re, word);
  });
  // Restore protected multi-word phrases as a unit
  PROTECTED_PHRASES.forEach(phrase => {
    const escaped = phrase.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(escaped, 'gi');
    text = text.replace(re, phrase);
  });
  getCustomWords().forEach(({ text: word, phraseOnly }) => {
    if (!word) return;
    const escaped = word.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    if (phraseOnly) {
      // Match only the exact multi-word phrase, case-insensitive
      const re = new RegExp(escaped, 'gi');
      text = text.replace(re, word);
    } else {
      // Match at any word boundary
      const re = new RegExp('\\b' + escaped + '\\b', 'gi');
      text = text.replace(re, word);
    }
  });
  return text;
}

function applyCleanup(text) {
  if (cleanupMode === 'caps') return applyUndoCaps(text);
  return text;
}

// ── Text helpers ──────────────────────────────────────────────────────────────

const ABBREVS = new Set([
  'Mr','Ms','Mrs','Dr','Jr','Sr','St','Prof','Rev','Hon','Pres',
  'Ph','No','Vol','Dept','Univ','vs','Gov','Rep','Sen','Lt','Sgt',
  'Cpl','Pvt','Capt','Maj','Col','Gen','Adm','Cmdr','Supt','Dir'
]);

function cleanText(t) {
  return t
    .replace(/\u2019/g, "'").replace(/[\u2018\u201A]/g, "'")
    .replace(/[\u201C\u201D\u201E]/g, '"')
    .replace(/\u2014/g, ' -- ').replace(/\u2013/g, '-')
    .replace(/\u2026/g, '...')
    .replace(/^[\u2022\u2023\u2043\u2219\u25AA\u25CF\u25E6\u30FB\uFE45\uFE46\u2027•\-\*]\s*/, '') // strip leading bullets
    .replace(/[ \t]+/g, ' ').trim();
}

// ── FIX 1: isSentenceEnd now strips trailing closing punctuation ──────────────
// Previously, words ending in ." or ?" or !) etc. would fail the /[.!?]$/ test
// because the closing quote/paren sat after the period. We now strip those
// trailing characters before checking, so "himself." and 'himself."' both
// correctly register as sentence-ending words.
function isSentenceEnd(words, idx) {
  const word = words[idx];
  // Strip trailing closing punctuation (quotes, parens, brackets) before checking
  const stripped = word.replace(/['")\]]+$/, '');
  if (!/[.!?]$/.test(stripped)) return false;
  const stem = stripped.replace(/[.!?]+$/, '');
  if (ABBREVS.has(stem)) return false;
  if (/^[A-Z]$/.test(stem)) return false;
  return true;
}

function splitIntoSentences(text) {
  const words = text.split(' ').filter(Boolean);
  const sentences = [];
  let current = [];
  for (let i = 0; i < words.length; i++) {
    current.push(words[i]);
    const nextWord = words[i + 1];
    if (isSentenceEnd(words, i) && (!nextWord || /^[A-Z\[]/.test(nextWord))) {
      sentences.push(current.join(' '));
      current = [];
    }
  }
  if (current.length) sentences.push(current.join(' '));
  return sentences;
}

function splitLongLine(text, maxLen) {
  if (text.length <= maxLen) return [text];

  if (text.includes(' -- ')) {
    const parts = text.split(' -- ').map(p => p.trim()).filter(Boolean);
    if (parts.every(p => p.length <= maxLen)) return parts;
  }

  const commaPositions = [];
  let inQuote = false;
  for (let i = 0; i < text.length; i++) {
    if (text[i] === '"') inQuote = !inQuote;
    if (text[i] === ',' && !inQuote && i < text.length - 1) commaPositions.push(i);
  }

  if (text.length > maxLen + 15 && commaPositions.length) {
    let bestSplit = null;
    for (const pos of commaPositions) {
      const left = text.slice(0, pos + 1).trim();
      const right = text.slice(pos + 1).trim();
      if (left.length <= maxLen && right.length > 0 && right.split(' ').length >= 3 && left.split(' ').length >= 6) {
        bestSplit = { left, right };
      }
    }
    if (bestSplit) {
      return [
        ...splitLongLine(bestSplit.left, maxLen),
        ...splitLongLine(bestSplit.right, maxLen)
      ];
    }
  }

  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    const candidate = current ? current + ' ' + word : word;
    if (candidate.length <= maxLen || !current) {
      current = candidate;
    } else {
      lines.push(current);
      current = word;
    }
  }
  if (current) lines.push(current);

  if (lines.length > 1) {
    const last = lines[lines.length - 1];
    const overflow = text.length - maxLen;
    if (last.split(' ').length === 1 && overflow <= 20) return [text];
  }

  return lines;
}

// ── Core split logic ──────────────────────────────────────────────────────────

// ── Stage direction detection ─────────────────────────────────────────────────
// Handles both [square bracket] and (parenthetical) forms.
// Requires meaningful content -- short lowercase fragments like [ing] or (s)
// are left in place as part of the text rather than extracted as stage directions.
// Square bracket form: must be 2+ chars and either all-caps or capitalized + 4+ chars.
// Parenthetical form: must be 3+ chars. Since parentheticals in scripts are almost
// always stage directions regardless of case, we accept any content of sufficient length.
function isStageDirection(token) {
  const isParens = token.startsWith('(') && token.endsWith(')');
  const isBracket = token.startsWith('[') && token.endsWith(']');
  const inner = token.slice(1, -1).trim();

  if (isParens) {
    return inner.length >= 3; // (lead applause), (laughter), (pause) -- all qualify
  }
  if (isBracket) {
    if (inner.length < 2) return false;
    if (/^[A-Z][A-Z\s\d]+$/.test(inner)) return true;  // all-caps: [APPLAUSE], [MUSIC UP]
    if (/^[A-Z]/.test(inner) && inner.length >= 4) return true; // capitalized: [Laughter]
    return false;
  }
  return false;
}

function splitScript(rawText, maxLen) {
  const rows = [];
  // Track whether the last thing pushed was a stage direction so the
  // very next text row (even across subPara boundaries) gets capitalized.
  let lastWasStage = false;

  // Split into raw paragraphs first, before any cleanup, so we can detect
  // speaker labels (Name:) on the original casing. Cleanup is applied per-segment
  // below, after speakers have been extracted.
  const rawParagraphs = rawText.split(/\r?\n/).map(t => cleanText(t)).filter(Boolean);

  // Speaker regex works on raw/original-cased text. We also accept all-lowercase
  // or title-case followed by colon so that "Heather speed:" is caught even after
  // undo-caps lowercasing. The key insight: we run speaker detection on the
  // pre-cleanup paragraph, then apply cleanup only to the prose remainder.
  // To handle this, we store the raw paragraph alongside the cleaned one.
  const rawRaw = rawText.split(/\r?\n/).map(t => cleanText(t)).filter(Boolean);

  for (let pi = 0; pi < rawRaw.length; pi++) {
    const para = rawRaw[pi];
    // Speaker pattern: matches "Word Word:" or "Dr. Word:" in any casing
    // We now also match lines that are ENTIRELY a name+colon (common in scripts)
    // by allowing any word-character sequence, not just title-cased ones.
    const speakerSplitRe = /((?:(?:Dr|Mr|Mrs|Ms|Prof|Rev|Hon|Gen|Col|Capt|Lt|Sgt|Gov|Sen|Rep)\.\s+)?(?:[A-Za-z][a-zA-Z'\-]+\.?\s+){0,2}[A-Za-z][a-zA-Z'\-]+\.?)\s*:\s*/g;
    const subParas = [];
    let lastIndex = 0;
    let match;
    speakerSplitRe.lastIndex = 0;

    while ((match = speakerSplitRe.exec(para)) !== null) {
      const before = para.slice(lastIndex, match.index).trim();
      if (before) subParas.push({ type: 'text', text: before });
      // Title-case the speaker name regardless of source casing
      const speakerRaw = match[1].trim();
      const speakerTitled = speakerRaw.replace(/\b(\w)/g, c => c.toUpperCase());
      subParas.push({ type: 'speaker', text: speakerTitled + ':' });
      lastIndex = match.index + match[0].length;
    }
    const remaining = para.slice(lastIndex).trim();
    if (remaining) subParas.push({ type: 'text', text: remaining });

    for (const sub of subParas) {
      if (sub.type === 'speaker') { rows.push(sub.text); lastWasStage = true; continue; }

      // Split on both [bracket] and (parenthetical) tokens.
      const tokens = sub.text.split(/((?:^|(?<=\s))(?:\[[^\]]*\]|\([^)]*\))(?=\s|$))/);
      const segments = [];
      let pending = '';
      for (const tok of tokens) {
        const t = tok.trim();
        if (!t) continue;
        if (/^[\[(]/.test(t) && /[\])]$/.test(t)) {
          if (isStageDirection(t)) {
            if (pending) { segments.push({ type: 'text', text: pending.trim() }); pending = ''; }
            segments.push({ type: 'stage', text: t });
          } else {
            pending += (pending ? ' ' : '') + t;
          }
        } else {
          pending += (pending ? ' ' : '') + t;
        }
      }
      if (pending) segments.push({ type: 'text', text: pending.trim() });

      for (let si = 0; si < segments.length; si++) {
        const seg = segments[si];
        if (seg.type === 'stage') {
          rows.push(seg.text);
          lastWasStage = true;
          continue;
        }

        // Capitalize the first word if the previous output was a stage direction --
        // works both within a subPara (via segments) and across subPara boundaries
        // (via the lastWasStage flag).
        const prevSeg = segments[si - 1];
        const afterStage = lastWasStage || (prevSeg && prevSeg.type === 'stage');
        let segText = seg.text;
        if (afterStage) {
          segText = segText.replace(/^([a-z])/, c => c.toUpperCase());
        }
        lastWasStage = false;

        const sentences = splitIntoSentences(segText);
        for (const sentence of sentences) {
          if (sentence.length > maxLen && sentence.split(' ').length > 5) {
            splitLongLine(sentence, maxLen).forEach(l => rows.push(l));
          } else {
            rows.push(sentence);
          }
        }
      }
    }
  }
  return rows;
}

// ── Main ──────────────────────────────────────────────────────────────────────

function run() {
  const raw = document.getElementById('input').value;
  const maxLen = parseInt(document.getElementById('maxLen').value) || 150;
  const status = document.getElementById('status');

  if (!raw.trim()) {
    status.textContent = 'Nothing to process.';
    status.className = 'status err';
    return;
  }

  status.textContent = 'Processing...';
  status.className = 'status';

  setTimeout(() => {
    const cleaned = applyCleanup(raw);
    const rows = splitScript(cleaned, maxLen);
    processedRows = rows;

    const tbody = document.getElementById('previewBody');
    tbody.innerHTML = '';
    rows.forEach((line, i) => {
      const tr = document.createElement('tr');
      const td1 = document.createElement('td');
      td1.textContent = i + 1;
      const td2 = document.createElement('td');
      td2.contentEditable = 'true';
      td2.textContent = line;
      td2.setAttribute('spellcheck', 'false');
      tr.appendChild(td1);
      tr.appendChild(td2);
      tbody.appendChild(tr);
    });

    document.getElementById('rowCount').textContent = `${rows.length} rows`;
    document.getElementById('previewWrap').style.display = '';
    document.getElementById('downloadBtn').disabled = false;
    status.textContent = `Done — ${rows.length} rows`;
    status.className = 'status ok';
  }, 30);
}

// ── Excel export ──────────────────────────────────────────────────────────────

function downloadExcel() {
  // Read from the DOM so any edits made in the preview are captured
  const editedRows = [...document.querySelectorAll('#previewBody tr')].map(tr => tr.cells[1].textContent);
  if (!editedRows.length) return;
  const wsData = [['#', 'Line'], ...editedRows.map((r, i) => [i + 1, r])];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{ wch: 6 }, { wch: 80 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Script Lines');
  XLSX.writeFile(wb, 'script_lines.xlsx');
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') run();
});
</script>
</body>
</html>
