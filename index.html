<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptFeed Line Splitter v2.2</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Comfortaa', sans-serif;
    background: #dce4df;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 40px 24px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 4px;
  }

  .logo-wrap img {
    max-width: 200px;
    display: inline-block;
  }

  header { margin-bottom: 4px; text-align: center; }
  h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #5a7265; }

  .card {
    background: #f5f8f6;
    border: 1px solid #b5c0bb;
    border-radius: 10px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  label {
    font-size: 12px;
    font-weight: 600;
    color: #1a1a1a;
    display: block;
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    height: 220px;
    padding: 10px 12px;
    font-family: 'Comfortaa', sans-serif;
    font-size: 12px;
    line-height: 1.75;
    background: #fff;
    border: 1px solid #b5c0bb;
    border-radius: 6px;
    color: #1a1a1a;
    resize: vertical;
    outline: none;
    transition: border-color .15s;
    margin-top: 6px;
  }
  textarea:focus { border-color: #2c6a4d; }
  textarea::placeholder { color: #bbb; }

  .controls { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; }

  input[type=number], input[type=text] {
    padding: 8px 12px;
    font-family: 'Comfortaa', sans-serif;
    font-size: 13px;
    background: #fff;
    border: 1px solid #b5c0bb;
    border-radius: 6px;
    color: #1a1a1a;
    outline: none;
    transition: border-color .15s;
    margin-top: 6px;
  }
  input[type=number] { width: 90px; }
  input[type=text] { width: 100%; }
  input[type=number]:focus,
  input[type=text]:focus { border-color: #2c6a4d; }

  .options-row {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 10px 14px;
    background: #fff;
    border: 1px solid #b5c0bb;
    border-radius: 6px;
  }

  .option-label {
    font-size: 12px;
    font-weight: 600;
    color: #1a1a1a;
    white-space: nowrap;
  }

  .toggle-btn {
    display: flex;
    gap: 10px;
  }

  .toggle-btn button {
    flex: 1;
    padding: 6px 14px;
    font-family: 'Comfortaa', sans-serif;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid #b5c0bb;
    background: #fff;
    color: #444;
    cursor: pointer;
    border-radius: 4px;
    transition: background .1s, color .1s;
  }
  .toggle-btn button.active {
    background: #2c6a4d;
    color: #fff;
    border-color: #2c6a4d;
  }

  .custom-words-row {
    padding: 12px 14px;
    background: #fff;
    border: 1px solid #b5c0bb;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .hint { font-size: 11px; color: #888; }

  .btn {
    padding: 10px 20px;
    font-family: 'Comfortaa', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity .15s, background .15s;
    white-space: nowrap;
  }
  .btn-primary { background: #2c6a4d; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #245c41; }
  .btn-primary:disabled { background: #9fb5ab; cursor: not-allowed; opacity: 0.7; }
  .btn-secondary { background: #fff; border: 1px solid #b5c0bb; color: #1a1a1a; }
  .btn-secondary:hover:not(:disabled) { background: #eef2f0; }
  .btn-secondary:disabled { opacity: .4; cursor: default; }

  .status { font-size: 12px; font-family: 'Comfortaa', sans-serif; color: #5a7265; align-self: center; }
  .status.ok { color: #2c6a4d; font-weight: 600; }
  .status.err { color: #b00020; font-weight: 600; }

  .preview-wrap { border: 1px solid #b5c0bb; border-radius: 6px; overflow: hidden; }

  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    background: #eef2f0;
    border-bottom: 1px solid #b5c0bb;
    font-size: 11px;
    color: #5a7265;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .preview-table-wrap { overflow-x: auto; max-height: 400px; overflow-y: auto; }

  table { width: 100%; border-collapse: collapse; font-family: 'Comfortaa', sans-serif; font-size: 12px; }

  thead th {
    position: sticky;
    top: 0;
    padding: 7px 12px;
    background: #eef2f0;
    border-bottom: 1px solid #b5c0bb;
    color: #5a7265;
    font-weight: 600;
    text-align: left;
    white-space: nowrap;
    z-index: 1;
  }
  thead th:first-child { width: 52px; text-align: center; }
  thead th:last-child { width: 36px; }

  tbody tr:nth-child(even) td { background: #f5f8f6; }

  tbody td {
    padding: 6px 12px;
    border-bottom: 1px solid #e0e8e4;
    color: #1a1a1a;
    vertical-align: top;
    line-height: 1.6;
  }
  tbody td:first-child { text-align: center; color: #9fb5ab; font-size: 11px; width: 52px; }
  tbody td[contenteditable] { outline: none; cursor: text; }
  tbody td[contenteditable]:focus {
    background: #f0faf4 !important;
    box-shadow: inset 0 0 0 1px #2c6a4d;
    border-radius: 2px;
  }
  tbody td[contenteditable]:hover:not(:focus) { background: #eef2f0 !important; }
  tbody tr:last-child td { border-bottom: none; }

  td.del-cell { width: 36px; text-align: center; padding: 4px 6px; vertical-align: middle; }

  .del-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border: none;
    background: transparent;
    color: #b5c0bb;
    font-size: 16px;
    line-height: 1;
    border-radius: 4px;
    cursor: pointer;
    transition: background .12s, color .12s;
    font-family: sans-serif;
  }
  .del-btn:hover { background: #fdecea; color: #b00020; }

  footer { text-align: center; font-size: 11px; color: #9fb5ab; padding-top: 8px; }
</style>
</head>
<body>
<div class="container">

  <div class="logo-wrap">
    <img src="https://i.imgur.com/YkhiJRe.png" alt="Intellitext">
  </div>

  <header>
    <h1>ScriptFeed Line Splitter</h1>
    <p class="subtitle">Paste a script, set your max line length, and download a numbered Excel file.</p>
  </header>

  <div class="card">
    <div>
      <label>Paste script text</label>
      <textarea id="input" placeholder="Paste your script here...&#10;&#10;Tip: Ctrl+Enter to process."></textarea>
    </div>

    <div class="options-row">
      <span class="option-label">Cleanup</span>
      <div class="toggle-btn">
        <button id="cleanup-off" class="active" onclick="setCleanup('off')">Off</button>
        <button id="cleanup-caps" onclick="setCleanup('caps')">Undo all-caps</button>
      </div>
    </div>

    <div class="custom-words-row" id="customWordsRow" style="display:none;">
      <label style="margin-bottom:0;">Fix Capitalization</label>
      <input type="text" id="customWords" placeholder="e.g., Transcriber, (Christy Joy), (TypeWell Transcriber)">
      <span class="hint">Comma-separated words that should be capitalized. Exact matching phrases should be in parentheses.</span>
    </div>

    <div class="controls">
      <div class="field">
        <label>Max chars / line</label>
        <input type="number" id="maxLen" value="150" min="40" max="500">
      </div>
      <button class="btn btn-primary" id="processBtn" onclick="run()">Process script</button>
      <button class="btn btn-secondary" id="downloadBtn" onclick="downloadExcel()" disabled>Download .xlsx</button>
      <span class="status" id="status"></span>
    </div>

    <div class="preview-wrap" id="previewWrap" style="display:none">
      <div class="preview-header">
        <span>Preview</span>
        <span id="rowCount"></span>
      </div>
      <div class="preview-table-wrap">
        <table>
          <thead><tr><th>#</th><th>Line</th><th></th></tr></thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <footer>For authorized use only &nbsp;|&nbsp; Intellitext LLC 2026 &nbsp;|&nbsp; v2.2</footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let processedRows = [];
let cleanupMode = 'off';

function setCleanup(mode) {
  cleanupMode = mode;
  ['off','caps'].forEach(m => {
    document.getElementById('cleanup-' + m).classList.toggle('active', m === mode);
  });
  document.getElementById('customWordsRow').style.display = mode === 'caps' ? '' : 'none';
}

// ── Cleanup ───────────────────────────────────────────────────────────────────

const PROTECTED = new Set([
  'UK','EU','UN','NATO','USSR','ROTC','POW','MIA',
  'FBI','CIA','NSA','DEA','ATF','IRS','TSA','DHS','DOD','DOJ','DOE',
  'EPA','FDA','FCC','FTC','SEC','FEMA','USMC','USAF','USN',
  'NASA','STEM','AI','DNA','RNA','GPS','USB','CPU','GPU','RAM',
  'HTML','CSS','API','URL','HTTP','HTTPS','PDF','SQL',
  'GPA','SAT','ACT','AP','IB','PhD','MBA','MD','JD','RN','BS','BA','MS','MA',
  'ACLU','NAACP','YMCA','YWCA','NFL','NBA','MLB','NHL','MLS','NCAA','IOC',
  'CDC','NIH','AMA','ABA','IEEE',
  'CEO','CFO','COO','CTO','VP','HR','PR','LLC','INC','LTD',
  'EST','PST','MST','CST','BC','AD',
  'UNR','UNLV','NSHE',
  'LDS','BC',
  'LGBTQ','HVAC','WiFi',
  'Dr','Mr','Mrs','Ms','Prof','Rev','Hon','Gov','Sen','Rep',
  'Gen','Col','Capt','Lt','Sgt','Cmdr','Adm','Pres',
  'Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday',
  'January','February','March','April','May','June','July',
  'August','September','October','November','December',
  'American','Americans','America','United','States','God','English','President','System',
  'Nevada','Reno','UNR','UNLV','University','Sandoval','Regent','Regents',
]);

function getCustomWords() {
  const raw = document.getElementById('customWords').value;
  return raw.split(',').map(w => w.trim()).filter(Boolean).map(entry => {
    const phraseMatch = entry.match(/^\((.+)\)$/);
    if (phraseMatch) return { text: phraseMatch[1].trim(), phraseOnly: true };
    return { text: entry, phraseOnly: false };
  });
}

function capitalizeSentenceStarts(text) {
  text = text.replace(/^([a-z])/, c => c.toUpperCase());
  text = text.replace(/([.!?]['")\]]*)\s+([a-z])/g, (m, punct, letter) => punct + ' ' + letter.toUpperCase());
  return text;
}

function fixPronouns(text) {
  return text.replace(/(?<![a-zA-Z])i(?![a-zA-Z])/g, 'I');
}

const PROTECTED_PHRASES = [
  'Nevada System of Higher Education',
  'President Sandoval',
];

function applyUndoCapsToLine(text) {
  text = text.toLowerCase();
  text = capitalizeSentenceStarts(text);
  text = fixPronouns(text);
  PROTECTED.forEach(word => {
    const re = new RegExp(`\\b${word.toLowerCase()}\\b`, 'g');
    text = text.replace(re, word);
  });
  PROTECTED_PHRASES.forEach(phrase => {
    const escaped = phrase.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(escaped, 'gi');
    text = text.replace(re, phrase);
  });
  getCustomWords().forEach(({ text: word, phraseOnly }) => {
    if (!word) return;
    const escaped = word.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    if (phraseOnly) {
      const re = new RegExp(escaped, 'gi');
      text = text.replace(re, word);
    } else {
      const re = new RegExp('\\b' + escaped + '\\b', 'gi');
      text = text.replace(re, word);
    }
  });
  return text;
}

// ── Text helpers ──────────────────────────────────────────────────────────────

const ABBREVS = new Set([
  'Mr','Ms','Mrs','Dr','Jr','Sr','St','Prof','Rev','Hon','Pres',
  'Ph','No','Vol','Dept','Univ','vs','Gov','Rep','Sen','Lt','Sgt',
  'Cpl','Pvt','Capt','Maj','Col','Gen','Adm','Cmdr','Supt','Dir'
]);

function cleanText(t) {
  return t
    .replace(/\u2019/g, "'").replace(/[\u2018\u201A]/g, "'")
    .replace(/[\u201C\u201D\u201E]/g, '"')
    .replace(/\u2014/g, ' -- ').replace(/\u2013/g, '-')
    .replace(/\u2026/g, '...')
    .replace(/^[\u2022\u2023\u2043\u2219\u25AA\u25CF\u25E6\u30FB\uFE45\uFE46\u2027•\-\*]\s*/, '')
    .replace(/[ \t]+/g, ' ').trim();
}

function isSentenceEnd(words, idx) {
  const word = words[idx];
  const stripped = word.replace(/['")\]]+$/, '');
  if (!/[.!?]$/.test(stripped)) return false;
  const stem = stripped.replace(/[.!?]+$/, '');
  if (ABBREVS.has(stem)) return false;
  if (/^[A-Z]$/.test(stem)) return false;
  return true;
}

function splitIntoSentences(text) {
  const words = text.split(' ').filter(Boolean);
  const sentences = [];
  let current = [];
  for (let i = 0; i < words.length; i++) {
    current.push(words[i]);
    const nextWord = words[i + 1];
    if (isSentenceEnd(words, i) && (!nextWord || /^[A-Z\[]/.test(nextWord))) {
      sentences.push(current.join(' '));
      current = [];
    }
  }
  if (current.length) sentences.push(current.join(' '));
  return sentences;
}

function splitLongLine(text, maxLen) {
  if (text.length <= maxLen) return [text];

  if (text.includes(' -- ')) {
    const parts = text.split(' -- ').map(p => p.trim()).filter(Boolean);
    if (parts.every(p => p.length <= maxLen)) return parts;
  }

  const commaPositions = [];
  let inQuote = false;
  for (let i = 0; i < text.length; i++) {
    if (text[i] === '"') inQuote = !inQuote;
    if (text[i] === ',' && !inQuote && i < text.length - 1) commaPositions.push(i);
  }

  if (text.length > maxLen + 15 && commaPositions.length) {
    let bestSplit = null;
    for (const pos of commaPositions) {
      const left = text.slice(0, pos + 1).trim();
      const right = text.slice(pos + 1).trim();
      if (left.length <= maxLen && right.length > 0 && right.split(' ').length >= 3 && left.split(' ').length >= 6) {
        bestSplit = { left, right };
      }
    }
    if (bestSplit) {
      return [
        ...splitLongLine(bestSplit.left, maxLen),
        ...splitLongLine(bestSplit.right, maxLen)
      ];
    }
  }

  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    const candidate = current ? current + ' ' + word : word;
    if (candidate.length <= maxLen || !current) {
      current = candidate;
    } else {
      lines.push(current);
      current = word;
    }
  }
  if (current) lines.push(current);

  if (lines.length > 1) {
    const last = lines[lines.length - 1];
    const overflow = text.length - maxLen;
    if (last.split(' ').length === 1 && overflow <= 20) return [text];
  }

  return lines;
}

// ── Paragraph joining ─────────────────────────────────────────────────────────

function isParagraphBreak(line) {
  if (!line) return true;
  if (/^\(.*\)$/.test(line) || /^\[.*\]$/.test(line)) return true;
  if (/^[A-Za-z][A-Za-z\s'\-\.]*:$/.test(line)) return true;
  if (/\bpage\s+\d+\s+of\s+\d+\b/i.test(line)) return true;
  return false;
}

function joinSoftWraps(rawText) {
  const lines = rawText.split(/\r?\n/).map(t => cleanText(t));
  const paragraphs = [];
  let current = '';

  for (const line of lines) {
    if (!line) {
      if (current) { paragraphs.push(current); current = ''; }
      continue;
    }
    if (isParagraphBreak(line)) {
      if (current) { paragraphs.push(current); current = ''; }
      paragraphs.push(line);
      continue;
    }
    current = current ? current + ' ' + line : line;
  }
  if (current) paragraphs.push(current);
  return paragraphs;
}

// ── Core split logic ──────────────────────────────────────────────────────────

function isStageDirection(token) {
  const isParens = token.startsWith('(') && token.endsWith(')');
  const isBracket = token.startsWith('[') && token.endsWith(']');
  const inner = token.slice(1, -1).trim();
  if (isParens) return inner.length >= 3;
  if (isBracket) {
    if (inner.length < 2) return false;
    if (/^[A-Z][A-Z\s\d]+$/.test(inner)) return true;
    if (/^[A-Z]/.test(inner) && inner.length >= 4) return true;
    return false;
  }
  return false;
}

function splitScript(rawText, maxLen) {
  const rows = [];
  let lastWasStage = false;

  const paragraphs = joinSoftWraps(rawText);

  for (const para of paragraphs) {
    if (!para) continue;

    const speakerSplitRe = /((?:(?:Dr|Mr|Mrs|Ms|Prof|Rev|Hon|Gen|Col|Capt|Lt|Sgt|Gov|Sen|Rep)\.\s+)?(?:[A-Za-z][a-zA-Z'\-]+\.?\s+){0,2}[A-Za-z][a-zA-Z'\-]+\.?)\s*:\s*/g;
    const subParas = [];
    let lastIndex = 0;
    let match;
    speakerSplitRe.lastIndex = 0;

    while ((match = speakerSplitRe.exec(para)) !== null) {
      const before = para.slice(lastIndex, match.index).trim();
      if (before) subParas.push({ type: 'text', text: before });
      const speakerRaw = match[1].trim();
      const speakerTitled = speakerRaw.replace(/\b(\w)/g, c => c.toUpperCase());
      subParas.push({ type: 'speaker', text: speakerTitled + ':' });
      lastIndex = match.index + match[0].length;
    }
    const remaining = para.slice(lastIndex).trim();
    if (remaining) subParas.push({ type: 'text', text: remaining });

    for (const sub of subParas) {
      if (sub.type === 'speaker') { rows.push(sub.text); lastWasStage = true; continue; }

      const tokens = sub.text.split(/((?:^|(?<=\s))(?:\[[^\]]*\]|\([^)]*\))(?=\s|$))/);
      const segments = [];
      let pending = '';
      for (const tok of tokens) {
        const t = tok.trim();
        if (!t) continue;
        if (/^[\[(]/.test(t) && /[\])]$/.test(t)) {
          if (isStageDirection(t)) {
            if (pending) { segments.push({ type: 'text', text: pending.trim() }); pending = ''; }
            segments.push({ type: 'stage', text: t });
          } else {
            pending += (pending ? ' ' : '') + t;
          }
        } else {
          pending += (pending ? ' ' : '') + t;
        }
      }
      if (pending) segments.push({ type: 'text', text: pending.trim() });

      for (let si = 0; si < segments.length; si++) {
        const seg = segments[si];
        if (seg.type === 'stage') { rows.push(seg.text); lastWasStage = true; continue; }

        const prevSeg = segments[si - 1];
        const afterStage = lastWasStage || (prevSeg && prevSeg.type === 'stage');
        let segText = seg.text;
        if (afterStage) segText = segText.replace(/^([a-z])/, c => c.toUpperCase());
        lastWasStage = false;

        const sentences = splitIntoSentences(segText);
        for (const sentence of sentences) {
          if (sentence.length > maxLen && sentence.split(' ').length > 5) {
            splitLongLine(sentence, maxLen).forEach(l => rows.push(l));
          } else {
            rows.push(sentence);
          }
        }
      }
    }
  }
  return rows;
}

// ── Preview rendering ─────────────────────────────────────────────────────────

function renumberRows() {
  const rows = document.querySelectorAll('#previewBody tr');
  rows.forEach((tr, i) => { tr.cells[0].textContent = i + 1; });
  document.getElementById('rowCount').textContent = `${rows.length} rows`;
}

function deleteRow(btn) {
  btn.closest('tr').remove();
  renumberRows();
}

function buildRow(line) {
  const tr = document.createElement('tr');

  const td1 = document.createElement('td');

  const td2 = document.createElement('td');
  td2.contentEditable = 'true';
  td2.textContent = line;
  td2.setAttribute('spellcheck', 'false');

  const td3 = document.createElement('td');
  td3.className = 'del-cell';
  const delBtn = document.createElement('button');
  delBtn.className = 'del-btn';
  delBtn.title = 'Delete row';
  delBtn.innerHTML = '&times;';
  delBtn.onclick = () => deleteRow(delBtn);
  td3.appendChild(delBtn);

  tr.appendChild(td1);
  tr.appendChild(td2);
  tr.appendChild(td3);
  return tr;
}

// ── Main ──────────────────────────────────────────────────────────────────────

function run() {
  const raw = document.getElementById('input').value;
  const maxLen = parseInt(document.getElementById('maxLen').value) || 150;
  const status = document.getElementById('status');

  if (!raw.trim()) {
    status.textContent = 'Nothing to process.';
    status.className = 'status err';
    return;
  }

  status.textContent = 'Processing...';
  status.className = 'status';

  setTimeout(() => {
    const rows = splitScript(raw, maxLen);
    const finalRows = cleanupMode === 'caps'
      ? rows.map(line => applyUndoCapsToLine(line))
      : rows;

    processedRows = finalRows;

    const tbody = document.getElementById('previewBody');
    tbody.innerHTML = '';
    finalRows.forEach(line => tbody.appendChild(buildRow(line)));
    renumberRows();

    document.getElementById('previewWrap').style.display = '';
    document.getElementById('downloadBtn').disabled = false;
    status.textContent = `Done — ${finalRows.length} rows`;
    status.className = 'status ok';
  }, 30);
}

// ── Excel export ──────────────────────────────────────────────────────────────

function downloadExcel() {
  const editedRows = [...document.querySelectorAll('#previewBody tr')].map(tr => tr.cells[1].textContent);
  if (!editedRows.length) return;

  const wsData = [['#', 'Line', 'Combined']];
  editedRows.forEach((line, i) => {
    wsData.push([i + 1, line, { f: `TRIM(A${i+2}&" "&B${i+2})` }]);
  });

  const ws = XLSX.utils.aoa_to_sheet(wsData);

  const boldStyle = { font: { bold: true } };
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let R = 0; R <= range.e.r; R++) {
    const cellA = XLSX.utils.encode_cell({ r: R, c: 0 });
    if (ws[cellA]) ws[cellA].s = boldStyle;
  }
  for (let C = 0; C <= 2; C++) {
    const cell = XLSX.utils.encode_cell({ r: 0, c: C });
    if (ws[cell]) ws[cell].s = boldStyle;
  }

  ws['!cols'] = [{ wch: 6 }, { wch: 80 }, { wch: 90 }];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Script Lines');
  XLSX.writeFile(wb, 'script_lines.xlsx', { cellStyles: true });
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') run();
});
</script>
</body>
</html>
